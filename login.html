<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CLERK CLUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a0a2e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(26, 26, 58, 0.95);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .logo span {
            color: #ffd700;
        }

        .logo small {
            font-size: 14px;
            color: #888;
            display: block;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #0d0d2a;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #8e24aa;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 20px 0 10px;
            background: linear-gradient(135deg, #6a1b9a, #8e24aa);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
        }

        .note {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            CLERK <span>CLUB</span>
            <small>Admin Panel</small>
        </div>
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="error" class="error"></div>
        <div class="note">Authorized access only</div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (!username || !password) {
                errorDiv.innerText = 'Please enter username and password';
                return;
            }

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = '/admin.html';
                } else {
                    errorDiv.innerText = 'Invalid username or password';
                }
            } catch (error) {
                errorDiv.innerText = 'Login failed. Please try again.';
            }
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
